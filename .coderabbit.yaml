# yaml-language-server: $schema=https://coderabbit.ai/integrations/schema.v2.json

reviews:
  auto_review:
    enabled: true
    drafts: false
    base_branches:
      - "main"
      - "develop"

  profile: "assertive"
  request_changes_workflow: true

  instructions: |
    Flag any hardcoded credentials, API keys, tokens, or passwords.
    Flag any outbound network calls to external or unrecognized URLs.
    Flag any use of environment variables that may expose sensitive data.
    Flag any changes to authentication or authorization logic.
    Flag any new dependencies added without a corresponding lock file update.
    Ensure all new functions handling sensitive data have proper error handling.
    Flag any logging statements that may expose sensitive information.
    Flag any disabled or weakened security controls.
    Flag any use of unsafe functions prone to buffer overflows such as strcpy, gets, sprintf, strcat in C/C++.
    Flag any manual memory management without bounds checking.
    Flag any array access without length validation.

  path_instructions:
    - path: "**/*.env*"
      instructions: "Treat all changes here as high priority. Flag everything."
    - path: "**/config/**"
      instructions: "Flag any secrets, credentials, or sensitive values."
    - path: "**/auth/**"
      instructions: "Scrutinize all authentication and authorization changes carefully."
    - path: "**/tests/**"
      instructions: "Ensure tests do not contain hardcoded credentials or real API keys."

  tools:
    ast-grep:
      essential_rules: true
      packages:
        - "your-org/platform-lint-rules@YOUR_SHA_HERE"

chat:
  auto_reply: true
